name: CI com ESLint
on:
  push:
    branches: [ main, dev ] # Adicionei main pois você está nela agora
  pull_request:
    branches: [ dev ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' 

      - name: Instalar dependências
        
        run: npm install --legacy-peer-deps 
        working-directory: Apresentacao-da-Disciplina/P1-Conteudos/Atividades/atividade4

      - name: Rodar ESLint
        run: npx eslint .
        working-directory: Apresentacao-da-Disciplina/P1-Conteudos/Atividades/atividade4
